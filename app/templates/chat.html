<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat with Bubbles</title>
<style>
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
body { margin: 0; min-height: 100vh; background: linear-gradient(#f7faff, #eefeff); display: flex; justify-content: center; align-items: center; }
.container { display: flex; flex-direction: column; align-items: center; width: 450px; background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
h1 { margin-bottom: 1rem; color: #254465; }
.chat-box { width: 100%; height: 300px; border: 1px solid #ccc; border-radius: 12px; padding: 12px; overflow-y: auto; margin-bottom: 1rem; background: #f9f9f9; display: flex; flex-direction: column; gap: 8px; }
input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
input[type="text"]:focus { outline: none; border-color: #254465; }
.button { width: 100%; padding: 14px; background-color: #0076e2; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
.button:hover { background-color: #005bb5; }

/* Chat bubble styles */
.bubble { max-width: 70%; padding: 10px 14px; border-radius: 20px; word-wrap: break-word; }
.you { align-self: flex-end; background-color: #0076e2; color: white; border-bottom-right-radius: 2px; }
.other { align-self: flex-start; background-color: #e0e0e0; color: black; border-bottom-left-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <h1>Chat</h1>
  <div class="chat-box" id="chatBox"></div>
  <input type="text" id="messageInput" placeholder="Type a message..." />
  <button type="button" class="button" id="sendBtn">Send</button>

    <a href="{{ url_for('main.dashboard') }}" className="button"">←
        Back to Dashboard</a>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Current logged-in user from Flask session
    const currentUser = "{{ session['user_email'] }}";

    let lastMessageCount = 0;

    // Render a single message (without showing sender)
    function addMessageToBox(msg, sender) {
        const div = document.createElement("div");
        div.classList.add("bubble", sender === currentUser ? "you" : "other");
        div.textContent = msg; // only show message text
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Send message to server
    async function sendMessage() {
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        await fetch("/send_message", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg})
        });
    }

    // Fetch messages from server
    async function fetchMessages() {
        const res = await fetch("/get_messages");
        const data = await res.json();
        const msgs = data.messages;

        for (let i = lastMessageCount; i < msgs.length; i++) {
            addMessageToBox(msgs[i].text, msgs[i].sender);
        }
        lastMessageCount = msgs.length;
    }

    // Event listeners
    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", e => {
        if (e.key === "Enter") {
            e.preventDefault(); // prevent double send
            sendMessage();
        }
    });

    // Poll messages every second
    setInterval(fetchMessages, 1000);

    // Initial load
    fetchMessages();

</script>


</body>
</html>
