<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ user_name }}'s Keywords</title>
</head>
<body>
    <h1>Keywords for {{ user_name }}</h1>
    {% if keywords %}
        <ul>
        {% for kw in keywords %}
            <li>{{ kw }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No keywords found yet.</p>
    {% endif %}
    <a href="{{ url_for('main.dashboard') }}">Back to Dashboard</a>
</body>
</html>
